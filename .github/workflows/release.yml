name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: all tests must pass before building release artifacts
  test-gate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Cargo check
        run: cd src-tauri && cargo check

      - name: Clippy lint
        run: cd src-tauri && cargo clippy -- -D warnings

  build:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Papercut ${{ github.ref_name }}'
          releaseBody: |
            ## Install Papercut

            Click the link for your platform to download. Then open the file to install.

            | Platform | Installer | Download |
            |----------|-----------|----------|
            | **Mac (M1/M2/M3/M4)** | .dmg | [Download](https://github.com/shyhunter/VibeCoding2/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_aarch64.dmg) |
            | **Mac (Intel)** | .dmg | [Download](https://github.com/shyhunter/VibeCoding2/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_x64.dmg) |
            | **Windows** | .exe | [Download](https://github.com/shyhunter/VibeCoding2/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_x64-setup.exe) |
            | **Linux (AppImage)** | .AppImage | [Download](https://github.com/shyhunter/VibeCoding2/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_amd64.AppImage) |
            | **Linux (Debian/Ubuntu)** | .deb | [Download](https://github.com/shyhunter/VibeCoding2/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_amd64.deb) |

            Everything you need is included — just install and go.

            > **Note:** Ebook conversion (EPUB, MOBI) requires [Calibre](https://calibre-ebook.com/download) — most users won't need this.

            ---

            <details>
            <summary>What are the Assets below?</summary>

            The **Assets** section below is GitHub's automatic list of the same installer files from the table above. You don't need to use it — the download links in the table are the same files. The `Source code` entries are the raw project code and are only useful for developers.
            </details>
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}
