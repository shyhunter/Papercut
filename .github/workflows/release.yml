name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Papercut ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform:
            - **macOS ARM (M1/M2/M3/M4):** `.dmg` file (aarch64)
            - **macOS Intel:** `.dmg` file (x86_64)
            - **Windows:** `.exe` installer
            - **Linux:** `.AppImage` or `.deb` package

            ### Optional dependencies

            **Ghostscript** (for PDF compression, PDF/A conversion, and repair):
            - macOS: `brew install ghostscript`
            - Windows: Download from https://ghostscript.com/releases/gsdnld.html
            - Linux: `sudo apt install ghostscript`

            **LibreOffice** (for document format conversion):
            - macOS/Windows: Download from https://www.libreoffice.org/download/
            - Linux: `sudo apt install libreoffice`

            **Calibre** (for ebook format conversion):
            - All platforms: Download from https://calibre-ebook.com/download
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}
