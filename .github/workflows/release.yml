name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: all tests must pass before building release artifacts
  test-gate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Version consistency check (tag vs source)
        run: npm run version:check
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Cargo check
        run: cd src-tauri && cargo check

      - name: Clippy lint
        run: cd src-tauri && cargo clippy -- -D warnings

  build:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Papercut ${{ github.ref_name }}'
          releaseBody: |
            ## Install Papercut

            Click the link for your platform to download. Then open the file to install.

            | Platform | Installer | Download |
            |----------|-----------|----------|
            | **Mac (M1/M2/M3/M4)** | .dmg | [Download](https://github.com/shyhunter/Papercut/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_aarch64.dmg) |
            | **Mac (Intel)** | .dmg | [Download](https://github.com/shyhunter/Papercut/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_x64.dmg) |
            | **Windows** | .exe | [Download](https://github.com/shyhunter/Papercut/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_x64-setup.exe) |
            | **Linux (AppImage)** | .AppImage | [Download](https://github.com/shyhunter/Papercut/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_amd64.AppImage) |
            | **Linux (Debian/Ubuntu)** | .deb | [Download](https://github.com/shyhunter/Papercut/releases/download/${{ github.ref_name }}/Papercut_${{ steps.version.outputs.version }}_amd64.deb) |

            Everything you need is included — just install and go.

            > **Mac users:** If you see _"Papercut is damaged and can't be opened"_, open **Terminal** and run:
            > ```
            > xattr -cr /Applications/Papercut.app
            > ```
            > Then open Papercut normally. This happens because the app is not yet signed with an Apple Developer certificate — it is safe to use.

            > **Note:** Ebook conversion (EPUB, MOBI) requires [Calibre](https://calibre-ebook.com/download) — most users won't need this.

            ---

            <details>
            <summary>What are the Assets below?</summary>

            The **Assets** section below is GitHub's automatic list of the same installer files from the table above. You don't need to use it — the download links in the table are the same files. The `Source code` entries are the raw project code and are only useful for developers.
            </details>
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}

  # ── Smoke tests: verify each platform artifact launches before publishing ──
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            asset: "Papercut_{version}_aarch64.dmg"
            type: dmg
          - platform: macos-14
            asset: "Papercut_{version}_x64.dmg"
            type: dmg
          - platform: windows-latest
            asset: "Papercut_{version}_x64-setup.exe"
            type: nsis
          - platform: ubuntu-22.04
            asset: "Papercut_{version}_amd64.AppImage"
            type: appimage

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15

    steps:
      - name: Derive asset filename
        id: asset
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ASSET=$(echo "${{ matrix.asset }}" | sed "s/{version}/$VERSION/g")
          echo "filename=${ASSET}" >> "$GITHUB_OUTPUT"
          echo "Will download: ${ASSET}"

      - name: Download release artifact
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "${{ github.repository }}" --json assets -q ".assets[].name" 2>/dev/null | grep -q "${{ steps.asset.outputs.filename }}"; then
            echo "FAIL: Asset ${{ steps.asset.outputs.filename }} not found in release $GITHUB_REF_NAME"
            echo "Available assets:"
            gh release view "$GITHUB_REF_NAME" --repo "${{ github.repository }}" --json assets -q ".assets[].name" 2>/dev/null || echo "(release not found)"
            exit 1
          fi
          gh release download "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern "${{ steps.asset.outputs.filename }}" \
            --dir .
          ls -la "${{ steps.asset.outputs.filename }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── macOS (.dmg) ──
      - name: "macOS: Mount DMG, verify app launches, check version"
        if: matrix.type == 'dmg'
        run: |
          hdiutil attach "${{ steps.asset.outputs.filename }}" -nobrowse -mountpoint /Volumes/Papercut
          test -d "/Volumes/Papercut/Papercut.app" || { echo "FAIL: Papercut.app not found in DMG"; exit 1; }

          BINARY="/Volumes/Papercut/Papercut.app/Contents/MacOS/tauri-app"
          if [ ! -x "$BINARY" ]; then
            BINARY="/Volumes/Papercut/Papercut.app/Contents/MacOS/Papercut"
          fi
          if [ ! -x "$BINARY" ]; then
            echo "FAIL: No app binary found in Contents/MacOS/"
            exit 1
          fi

          "$BINARY" &
          APP_PID=$!
          sleep 8

          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "PASS: Papercut running with PID: $APP_PID"
          else
            echo "FAIL: Papercut exited prematurely"
            exit 1
          fi

          # Version assertion: Info.plist CFBundleShortVersionString must match tag
          PLIST="/Volumes/Papercut/Papercut.app/Contents/Info.plist"
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "")
          EXPECTED_VERSION="${{ steps.asset.outputs.version }}"
          if [ "$BUNDLE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "FAIL: Info.plist CFBundleShortVersionString=\"$BUNDLE_VERSION\" expected \"$EXPECTED_VERSION\""
            kill "$APP_PID" 2>/dev/null || true
            hdiutil detach /Volumes/Papercut
            exit 1
          fi
          echo "PASS: Version in bundle: $BUNDLE_VERSION ✓"

          kill "$APP_PID" 2>/dev/null || true
          sleep 2
          hdiutil detach /Volumes/Papercut
          echo "=== macOS smoke test PASSED ==="

      # ── Windows (NSIS .exe) ──
      - name: "Windows: Install, verify app launches, check version"
        if: matrix.type == 'nsis'
        shell: pwsh
        run: |
          $installer = "${{ steps.asset.outputs.filename }}"
          Start-Process -FilePath ".\$installer" -ArgumentList "/S" -Wait -NoNewWindow

          # Tauri's Cargo package name is "tauri-app"; the NSIS installer may use
          # either the productName ("Papercut") or the Cargo binary name ("tauri-app")
          # for the .exe. Search for both in all plausible install locations.
          $candidateNames = @("Papercut.exe", "tauri-app.exe")
          $searchRoots = @(
            $env:LOCALAPPDATA,
            $env:ProgramFiles,
            ${env:ProgramFiles(x86)},
            $env:APPDATA
          )

          $binary = $null
          foreach ($root in $searchRoots) {
            if (-Not $root) { continue }
            foreach ($name in $candidateNames) {
              $found = Get-ChildItem -Path $root -Recurse -Filter $name -ErrorAction SilentlyContinue -Depth 5 | Select-Object -First 1
              if ($found) { $binary = $found.FullName; break }
            }
            if ($binary) { break }
          }

          if (-Not $binary) {
            Write-Host "FAIL: No Papercut binary found after install."
            Write-Host "--- Listing $env:LOCALAPPDATA (depth 4) ---"
            Get-ChildItem -Path $env:LOCALAPPDATA -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          Write-Host "Binary found at: $binary"

          $proc = Start-Process -FilePath $binary -PassThru
          Start-Sleep -Seconds 8

          if (-Not $proc.HasExited) {
            Write-Host "PASS: Papercut is running (PID: $($proc.Id))"
          } else {
            Write-Host "FAIL: Papercut exited immediately with code $($proc.ExitCode)"
            exit 1
          }

          # Version assertion: ProductVersion in binary metadata must match tag.
          # Note: Windows PE ProductVersion is a string resource set by Tauri from
          # tauri.conf.json, so it should match the full semver including pre-release.
          $expectedVersion = "${{ steps.asset.outputs.version }}"
          $fileVersion = (Get-Item $binary).VersionInfo.ProductVersion
          if ($fileVersion -ne $expectedVersion) {
            Write-Host "FAIL: ProductVersion='$fileVersion' expected '$expectedVersion'"
            Stop-Process -Id $proc.Id -Force
            exit 1
          }
          Write-Host "PASS: Version in binary metadata: $fileVersion ✓"

          Stop-Process -Id $proc.Id -Force
          Write-Host "=== Windows smoke test PASSED ==="

      # ── Linux (AppImage) ──
      - name: "Linux: Install display dependencies"
        if: matrix.type == 'appimage'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 libfuse2 xvfb

      - name: "Linux: Verify AppImage launches"
        if: matrix.type == 'appimage'
        run: |
          APPIMAGE="${{ steps.asset.outputs.filename }}"
          chmod +x "$APPIMAGE"

          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          XVFB_PID=$!
          sleep 2

          ./$APPIMAGE &
          APP_PID=$!
          sleep 8

          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "PASS: Papercut AppImage is running (PID: $APP_PID)"
          else
            echo "FAIL: Papercut AppImage exited prematurely"
            kill "$XVFB_PID" 2>/dev/null || true
            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          kill "$XVFB_PID" 2>/dev/null || true
          echo "=== Linux smoke test PASSED ==="
          # Note: AppImage format does not expose version metadata; version check skipped.

  # ── Publish: promote draft to live only after all smoke tests pass ─────────
  publish-release:
    needs: smoke-test
    runs-on: ubuntu-22.04

    steps:
      - name: Promote draft to published prerelease
        run: gh release edit "${{ github.ref_name }}" --draft=false --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
