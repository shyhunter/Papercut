name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate: all tests must pass before building release artifacts
  test-gate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Cargo check
        run: cd src-tauri && cargo check

      - name: Clippy lint
        run: cd src-tauri && cargo clippy -- -D warnings

  build:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Papercut ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            | Platform | Installer |
            |----------|-----------|
            | **macOS ARM** (M1/M2/M3/M4) | `.dmg` (aarch64) |
            | **macOS Intel** | `.dmg` (x86_64) |
            | **Windows** | `.exe` installer |
            | **Linux** | `.AppImage` or `.deb` |

            ## Important Notes

            Most features work out of the box. Some advanced PDF tools require **Ghostscript** (free, open-source):

            | OS | Install command |
            |----|----------------|
            | macOS | `brew install ghostscript` |
            | Windows | [Download from ghostscript.com](https://ghostscript.com/releases/gsdnld.html) |
            | Linux | `sudo apt install ghostscript` |

            **Ebook conversion** (EPUB, MOBI) requires [Calibre](https://calibre-ebook.com/download) — most users won't need this.

            ## Checksums

            SHA-256 checksums are listed next to each asset below for download verification.
            To verify: compare the checksum shown here with the output of `shasum -a 256 <downloaded-file>`.
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}
