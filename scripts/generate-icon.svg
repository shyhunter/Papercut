<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Papercut App Icon — Black & White
    macOS-style superellipse via smooth path (not rect rx/ry which gives wrong curvature)
  -->

  <!-- macOS-style superellipse background (smoother than rx/ry rounded rect) -->
  <path d="
    M 512 16
    C 780 16 848 16 912 80
    C 976 144 1008 244 1008 512
    C 1008 780 976 880 912 944
    C 848 1008 780 1008 512 1008
    C 244 1008 144 1008 80 944
    C 16 880 16 780 16 512
    C 16 244 16 144 80 80
    C 144 16 244 16 512 16 Z
  " fill="#1a1a1a"/>

  <!-- Large paper sheet (white, centered, big) -->
  <g>
    <!-- Main paper body -->
    <path d="
      M 300 160
      L 680 160
      L 724 204
      L 724 864
      L 300 864
      Z
    " fill="#ffffff"/>
    <!-- Folded corner -->
    <path d="M 680 160 L 680 204 L 724 204 Z" fill="#cccccc"/>

    <!-- Text lines on paper -->
    <line x1="360" y1="280" x2="660" y2="280" stroke="#d0d0d0" stroke-width="12" stroke-linecap="round"/>
    <line x1="360" y1="340" x2="640" y2="340" stroke="#d0d0d0" stroke-width="12" stroke-linecap="round"/>
    <line x1="360" y1="400" x2="620" y2="400" stroke="#d0d0d0" stroke-width="12" stroke-linecap="round"/>
    <line x1="360" y1="460" x2="650" y2="460" stroke="#d0d0d0" stroke-width="12" stroke-linecap="round"/>
    <line x1="360" y1="520" x2="600" y2="520" stroke="#d0d0d0" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Large scissors cutting diagonally across the paper -->
  <g transform="translate(510, 660) rotate(-25) scale(1.3)">
    <!-- Left handle (finger hole) -->
    <ellipse cx="-75" cy="70" rx="32" ry="48" fill="none" stroke="#ffffff" stroke-width="16"/>
    <!-- Left blade -->
    <path d="M -55 30 L 20 -130" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>

    <!-- Right handle (finger hole) -->
    <ellipse cx="75" cy="70" rx="32" ry="48" fill="none" stroke="#ffffff" stroke-width="16"/>
    <!-- Right blade -->
    <path d="M 55 30 L -20 -130" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>

    <!-- Pivot point -->
    <circle cx="0" cy="-40" r="14" fill="#1a1a1a" stroke="#ffffff" stroke-width="6"/>
  </g>

  <!-- Cut line (dashed) across paper -->
  <line x1="240" y1="620" x2="520" y2="540" stroke="#888888" stroke-width="4" stroke-dasharray="16,12" stroke-linecap="round"/>
</svg>
