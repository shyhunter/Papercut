<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Paper document (slightly tilted, being cut) -->
  <!-- Left piece of paper (cut off) -->
  <g filter="url(#shadow)">
    <path d="M 280 220 L 460 220 L 460 560 L 340 620 L 280 620 Z" fill="url(#paper)" opacity="0.85" transform="rotate(-8, 370, 420)"/>
    <!-- Lines on left paper -->
    <line x1="310" y1="290" x2="430" y2="290" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(-8, 370, 420)"/>
    <line x1="310" y1="340" x2="420" y2="340" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(-8, 370, 420)"/>
    <line x1="310" y1="390" x2="400" y2="390" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(-8, 370, 420)"/>
  </g>

  <!-- Right piece of paper -->
  <g filter="url(#shadow)">
    <path d="M 520 250 L 740 250 L 740 750 L 520 750 Z" fill="url(#paper)" transform="rotate(5, 630, 500)"/>
    <!-- Lines on right paper -->
    <line x1="555" y1="330" x2="705" y2="330" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(5, 630, 500)"/>
    <line x1="555" y1="385" x2="700" y2="385" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(5, 630, 500)"/>
    <line x1="555" y1="440" x2="680" y2="440" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(5, 630, 500)"/>
    <line x1="555" y1="495" x2="690" y2="495" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(5, 630, 500)"/>
    <line x1="555" y1="550" x2="670" y2="550" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round" transform="rotate(5, 630, 500)"/>
  </g>

  <!-- Scissors -->
  <g transform="translate(512, 580) rotate(-30)">
    <!-- Left blade -->
    <ellipse cx="-90" cy="55" rx="28" ry="55" fill="none" stroke="#f1f5f9" stroke-width="14" transform="rotate(15, -90, 55)"/>
    <path d="M -70 20 L 30 -120" stroke="url(#blade)" stroke-width="22" stroke-linecap="round"/>

    <!-- Right blade -->
    <ellipse cx="90" cy="55" rx="28" ry="55" fill="none" stroke="#f1f5f9" stroke-width="14" transform="rotate(-15, 90, 55)"/>
    <path d="M 70 20 L -30 -120" stroke="url(#blade)" stroke-width="22" stroke-linecap="round"/>

    <!-- Pivot screw -->
    <circle cx="0" cy="-50" r="14" fill="#f1f5f9" stroke="#9ca3af" stroke-width="4"/>
    <circle cx="0" cy="-50" r="5" fill="#9ca3af"/>
  </g>
</svg>
